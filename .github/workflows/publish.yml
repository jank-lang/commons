name: Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

# Only allow one build per branch at a time. New builds will NOT cancel existing builds.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish tagged packages
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: awalsh128/cache-apt-pkgs-action@5902b33ae29014e6ca012c5d8025d4346556bd40
        with:
          packages: git gpg leiningen
          # Increment this when the package list changes.
          version: 1
      - name: Configure GPG Key
        run: |
          echo -n "${JANK_GPG_SIGNING_KEY}" | gpg --import
        env:
          JANK_GPG_SIGNING_KEY: ${{ secrets.JANK_GPG_SIGNING_KEY }}
      - name: Find and publish
        run: ${{ github.workspace }}/bin/publish ${{ github.event.before }} ${{ github.sha }}
